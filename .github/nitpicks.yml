- markdown: |
    Are you _sure_ you want to use the legacy `prices.usd` table? Consider using `prices.minute` ([docs](https://docs.dune.com/data-catalog/curated/prices/overview))
  pathFilter:
    - "**/*.sql"
  contentFilter:
    - '(\+.*prices\.usd)'

- markdown: |
    This query reads from a partitioned table without a `block_date` filter. Adding `WHERE block_date >= ...` enables partition pruning and significantly reduces cost. ([efficient queries guide](https://docs.dune.com/query-engine/writing-efficient-queries))
  pathFilter:
    - "**/*.sql"
  contentFilter:
    - '(\+.*(?:dex\.trades|erc20_\w+\.evt_transfer|balancer_v\d+_\w+\.\w+)(?!.*block_date))'

- markdown: |
    Missing `-- part of a query repo` header. Please add it as the first line of the file.
  pathFilter:
    - "**/*.sql"
  contentFilter:
    - '^(?!\-\-\s*part of a query repo)'
