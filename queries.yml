# Master manifest of all query IDs managed by this repository.
#
# Each entry maps a Dune query ID to a category (subdirectory under balancer/).
# The pull_from_dune.py script reads this file to fetch and organize queries.
# The validate.py script cross-checks this against actual files.
#
# Format:
#   - id: <dune_query_id>
#     category: <subdirectory>   # e.g. volume, tvl, fees, pools/weighted, views
#
# CoW AMM queries (in cowamm/) are listed without a category -- their files
# already exist and are located by searching the repo tree.

